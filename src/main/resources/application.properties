#web
quarkus.application.name=centerstage
quarkus.http.port=50700
quarkus.http.io-threads=10

#monitoring
quarkus.smallrye-health.root-path=/actuator/health
quarkus.smallrye-health.liveness-path=/actuator/health/liveness
quarkus.smallrye-health.readiness-path=/actuator/health/readiness
quarkus.micrometer.export.prometheus.path=/actuator/prometheus

#logging
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."org.goafabric".level=INFO

#jacoco
quarkus.jacoco.report=false

#persistence
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:centerstage;DATABASE_TO_UPPER=FALSE
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

#ingestion schedule (ISO-8601 duration, e.g. PT30M = every 30 minutes)
centerstage.ingestion.interval=PT30M

#centerstage
#centerstage.catalog.file=doc/catalog/entities-local.yaml
centerstage.catalog.file=https://github.com/goafabric/backstage/blob/develop/catalog/entities-git.yaml

techradar.url=https://github.com/goafabric/example-konstruction-kit/blob/develop/helm/infra/techradar/data/config-backstage.json

#github
quarkus.rest-client.GitHubAdapter.url=https://api.github.com
quarkus.rest-client.GitHubAdapter.connect-timeout=10000
quarkus.rest-client.GitHubAdapter.read-timeout=10000

github.token=${GITHUB_TOKEN:none}

#gitlab
quarkus.rest-client.GitLabAdapter.url=https://git.my.ag
quarkus.rest-client.GitLabAdapter.connect-timeout=10000
quarkus.rest-client.GitLabAdapter.read-timeout=10000

gitlab.token=${GITLAB_TOKEN:none}
